name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          cd plugins
          zip -r ../postglider-adapter.zip postglider-adapter/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: postglider-adapter.zip
          generate_release_notes: false
          body: |
            See [metadata.json](https://github.com/${{ github.repository }}/blob/main/metadata.json) for changelog.
